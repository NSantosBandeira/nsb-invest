services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: invest
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invest"]
      interval: 5s
      timeout: 5s
      retries: 10

  # App em container (opcional): docker compose --profile full up --build
  app:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/invest?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-troque-este-secret-em-producao}
      # Rede local: AUTH_URL=http://SEU_IP:3000 docker compose --profile full up
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: "true"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
